<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Player</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            text-align: center;
            padding: 20px;
        }

        input {
            width: 90%;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            margin-bottom: 10px;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            background: red;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        iframe {
            margin-top: 20px;
            width: 100%;
            height: 300px;
            border: none;
            border-radius: 10px;
        }

        .subscribe-box {
            margin-top: 20px;
            background: #222;
            padding: 15px;
            border-radius: 10px;
        }

        .sub-btn {
            background: #ff0000;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>YouTube Player</h1>
    <p>Paste a YouTube link below</p>

    <input id="ytlink" placeholder="https://www.youtube.com/watch?v=VIDEOID">
    <br>
    <button onclick="playVideo()">Play Video</button>

    <iframe id="player" allowfullscreen></iframe>

    <div class="subscribe-box">
        <p>Enjoying this video? Why not subscribe!</p>
        <button class="sub-btn" onclick="subscribe()">Subscribe</button>
    </div>

    <script>
        function playVideo() {
            let url = document.getElementById("ytlink").value;
            url = url.replace("watch?v=", "embed/");
            document.getElementById("player").src = url;
        }

        function subscribe() {
            window.location.href = "https://youtube.com/@joshuajones-z6k?si=sYR_y3RKW0yE5XyK";
        }
    </script>

</body>
</html>
